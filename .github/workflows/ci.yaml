name: CI

on:
  push: {}
  workflow_call:
    inputs:
      deploy:
        description: Whether or not to push
        default: false
        required: false
        type: boolean
  workflow_dispatch:
    inputs:
      deploy:
        description: Whether or not to push
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-ci
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: pip
          cache-dependency-path: .pre-commit-config.yaml
      - run: pipx run pre-commit run --show-diff-on-failure --color=always --all-files

  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v5
        id: pages
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
             go.sum
             config/_default/module.yaml
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: "**/package-lock.json"
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Install Hugo
        run: go install -tags extended github.com/gohugoio/hugo@v0.143.1
        env:
          CGO_ENABLED: 1
      - name: Setup Hugo cache path
        run: echo "HUGO_CACHEDIR=$(go env GOMODCACHE)/hugo_cache" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci --install-strategy=nested
      - name: Build
        run: npm run build --
          --environment prod
          --baseURL "${{ steps.pages.outputs.base_url }}/"
          --logLevel info
      - name: Upload artifact
        if: ${{ ( github.event_name == 'push' && github.ref_name == 'trunk' ) || inputs.deploy == true }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ ( github.event_name == 'push' && github.ref_name == 'trunk' ) || inputs.deploy == true }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: [pre-commit, compile]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
